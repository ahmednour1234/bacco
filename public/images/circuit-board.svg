<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="40%" stop-color="#cccccc" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
    <filter id="blur4">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Outer glow rings -->
  <circle cx="200" cy="200" r="185" fill="none" stroke="#444" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="170" fill="none" stroke="#555" stroke-width="0.5" opacity="0.5"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#555" stroke-width="0.8" opacity="0.7"/>
  <circle cx="200" cy="200" r="140" fill="none" stroke="#666" stroke-width="0.5" opacity="0.6"/>
  <circle cx="200" cy="200" r="125" fill="none" stroke="#777" stroke-width="1" opacity="0.8"/>
  <circle cx="200" cy="200" r="110" fill="none" stroke="#888" stroke-width="0.5" opacity="0.7"/>
  <circle cx="200" cy="200" r="95" fill="none" stroke="#999" stroke-width="1.5" opacity="0.9"/>
  <circle cx="200" cy="200" r="80" fill="none" stroke="#aaa" stroke-width="0.8" opacity="0.8"/>
  <circle cx="200" cy="200" r="65" fill="none" stroke="#bbb" stroke-width="1.5" opacity="0.9"/>
  <circle cx="200" cy="200" r="50" fill="none" stroke="#ccc" stroke-width="1" opacity="0.9"/>
  <circle cx="200" cy="200" r="35" fill="none" stroke="#ddd" stroke-width="2" opacity="1"/>
  <circle cx="200" cy="200" r="20" fill="none" stroke="#eee" stroke-width="1.5" opacity="1"/>

  <!-- Central glow -->
  <circle cx="200" cy="200" r="18" fill="#fff" opacity="0.15" filter="url(#blur4)"/>
  <circle cx="200" cy="200" r="10" fill="#fff" opacity="0.4" filter="url(#blur2)"/>
  <circle cx="200" cy="200" r="4" fill="#fff" opacity="0.9"/>

  <!-- Radial circuit traces -->
  <!-- Top -->
  <line x1="200" y1="162" x2="200" y2="30" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="197" y1="162" x2="197" y2="55" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="203" y1="162" x2="203" y2="55" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <!-- Horizontal tick at top -->
  <line x1="185" y1="42" x2="215" y2="42" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="192" y1="35" x2="208" y2="35" stroke="#999" stroke-width="0.5" opacity="0.6"/>

  <!-- Bottom -->
  <line x1="200" y1="238" x2="200" y2="370" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="197" y1="238" x2="197" y2="345" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="203" y1="238" x2="203" y2="345" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="185" y1="358" x2="215" y2="358" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="192" y1="365" x2="208" y2="365" stroke="#999" stroke-width="0.5" opacity="0.6"/>

  <!-- Left -->
  <line x1="162" y1="200" x2="30" y2="200" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="162" y1="197" x2="55" y2="197" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="162" y1="203" x2="55" y2="203" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="42" y1="185" x2="42" y2="215" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="35" y1="192" x2="35" y2="208" stroke="#999" stroke-width="0.5" opacity="0.6"/>

  <!-- Right -->
  <line x1="238" y1="200" x2="370" y2="200" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="238" y1="197" x2="345" y2="197" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="238" y1="203" x2="345" y2="203" stroke="#666" stroke-width="0.5" opacity="0.5"/>
  <line x1="358" y1="185" x2="358" y2="215" stroke="#888" stroke-width="1" opacity="0.7"/>
  <line x1="365" y1="192" x2="365" y2="208" stroke="#999" stroke-width="0.5" opacity="0.6"/>

  <!-- Diagonal traces NE -->
  <line x1="214" y1="186" x2="335" y2="65" stroke="#777" stroke-width="0.8" opacity="0.6"/>
  <line x1="316" y1="84" x2="316" y2="65" stroke="#777" stroke-width="0.8" opacity="0.5"/>
  <line x1="316" y1="65" x2="335" y2="65" stroke="#777" stroke-width="0.8" opacity="0.5"/>

  <!-- Diagonal traces SW -->
  <line x1="186" y1="214" x2="65" y2="335" stroke="#777" stroke-width="0.8" opacity="0.6"/>
  <line x1="84" y1="316" x2="84" y2="335" stroke="#777" stroke-width="0.8" opacity="0.5"/>
  <line x1="84" y1="335" x2="65" y2="335" stroke="#777" stroke-width="0.8" opacity="0.5"/>

  <!-- Diagonal traces NW -->
  <line x1="186" y1="186" x2="65" y2="65" stroke="#777" stroke-width="0.8" opacity="0.6"/>
  <line x1="84" y1="84" x2="84" y2="65" stroke="#777" stroke-width="0.8" opacity="0.5"/>
  <line x1="84" y1="65" x2="65" y2="65" stroke="#777" stroke-width="0.8" opacity="0.5"/>

  <!-- Diagonal traces SE -->
  <line x1="214" y1="214" x2="335" y2="335" stroke="#777" stroke-width="0.8" opacity="0.6"/>
  <line x1="316" y1="316" x2="316" y2="335" stroke="#777" stroke-width="0.8" opacity="0.5"/>
  <line x1="316" y1="335" x2="335" y2="335" stroke="#777" stroke-width="0.8" opacity="0.5"/>

  <!-- Small dots on rings (connection points) -->
  <!-- Outer ring dots -->
  <circle cx="200" cy="15" r="2" fill="#888"/>
  <circle cx="200" cy="385" r="2" fill="#888"/>
  <circle cx="15" cy="200" r="2" fill="#888"/>
  <circle cx="385" cy="200" r="2" fill="#888"/>

  <!-- Ring connector dots -->
  <circle cx="200" cy="44" r="1.5" fill="#999"/>
  <circle cx="200" cy="356" r="1.5" fill="#999"/>
  <circle cx="44" cy="200" r="1.5" fill="#999"/>
  <circle cx="356" cy="200" r="1.5" fill="#999"/>

  <!-- Small circuit pads scattered on outer area -->
  <rect x="70" y="120" width="6" height="4" rx="1" fill="#666" opacity="0.7"/>
  <rect x="324" y="120" width="6" height="4" rx="1" fill="#666" opacity="0.7"/>
  <rect x="70" y="276" width="6" height="4" rx="1" fill="#666" opacity="0.7"/>
  <rect x="324" y="276" width="6" height="4" rx="1" fill="#666" opacity="0.7"/>

  <rect x="110" y="70" width="4" height="6" rx="1" fill="#666" opacity="0.7"/>
  <rect x="286" y="70" width="4" height="6" rx="1" fill="#666" opacity="0.7"/>
  <rect x="110" y="324" width="4" height="6" rx="1" fill="#666" opacity="0.7"/>
  <rect x="286" y="324" width="4" height="6" rx="1" fill="#666" opacity="0.7"/>

  <!-- Horizontal trace segments mid-left -->
  <line x1="30" y1="160" x2="70" y2="160" stroke="#666" stroke-width="0.8" opacity="0.5"/>
  <line x1="30" y1="240" x2="70" y2="240" stroke="#666" stroke-width="0.8" opacity="0.5"/>
  <!-- Horizontal trace segments mid-right -->
  <line x1="330" y1="160" x2="370" y2="160" stroke="#666" stroke-width="0.8" opacity="0.5"/>
  <line x1="330" y1="240" x2="370" y2="240" stroke="#666" stroke-width="0.8" opacity="0.5"/>

  <!-- Vertical connectors -->
  <line x1="30" y1="160" x2="30" y2="240" stroke="#666" stroke-width="0.8" opacity="0.5"/>
  <line x1="370" y1="160" x2="370" y2="240" stroke="#666" stroke-width="0.8" opacity="0.5"/>

  <!-- Central glow overlay -->
  <circle cx="200" cy="200" r="200" fill="url(#glow)" opacity="0.4"/>

  <!-- Tiny dots scattered around for texture -->
  <g fill="#888" opacity="0.4">
    <circle cx="130" cy="95" r="1"/>
    <circle cx="270" cy="95" r="1"/>
    <circle cx="130" cy="305" r="1"/>
    <circle cx="270" cy="305" r="1"/>
    <circle cx="95" cy="130" r="1"/>
    <circle cx="305" cy="130" r="1"/>
    <circle cx="95" cy="270" r="1"/>
    <circle cx="305" cy="270" r="1"/>
    <circle cx="55" cy="155" r="1"/>
    <circle cx="345" cy="155" r="1"/>
    <circle cx="55" cy="245" r="1"/>
    <circle cx="345" cy="245" r="1"/>
  </g>
</svg>
