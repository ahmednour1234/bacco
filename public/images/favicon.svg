<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 68 68" fill="none">
  <!-- Qimta icon mark: rounded square with price/SAR strokes (white on brand green) -->
  <rect x="0" y="0" width="68" height="68" rx="15" fill="#1a5c2a"/>

  <!-- Two angled vertical strokes -->
  <line x1="26" y1="17" x2="23" y2="54" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
  <line x1="43" y1="17" x2="40" y2="54" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>

  <!-- Two horizontal crossbars -->
  <line x1="19" y1="30" x2="50" y2="30" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="19" y1="43" x2="50" y2="43" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round"/>
</svg>
